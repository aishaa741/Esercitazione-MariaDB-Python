<!DOCTYPE html> <!-- pagina HTML5 -->
<html lang="it"> <!-- lingua italiano -->
<head>
    <meta charset="UTF-8"> <!-- codifica caratteri UTF-8 -->
    <title>NEXUS OS | {{ titolo }}</title> <!-- titolo dinamico passato dal backend -->
    <style> <!-- stile CSS interno -->
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;700&display=swap');
        :root { /* colori e variabili usate in tutta la pagina */
            --neon-blue: #00f3ff;
            --neon-purple: #bc13fe;
            --dark-bg: #050505;
            --glass-bg: rgba(15, 15, 20, 0.65);
            --glass-border: rgba(0, 243, 255, 0.2);
            --text-main: #ffffff;
            --text-muted: #a0aab2;
            --table-row-hover: rgba(0, 243, 255, 0.05);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; } <!-- reset base -->
        body { font-family: 'Rajdhani', sans-serif; background-color: var(--dark-bg); color: var(--text-main); overflow-x: hidden; }
        .navbar { position: fixed; top: 0; width: 100%; z-index: 1000; background: rgba(5, 5, 5, 0.8); backdrop-filter: blur(15px); padding: 1.5rem 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--glass-border); box-shadow: 0 0 20px rgba(0, 243, 255, 0.1); }
        .nav-logo { font-family: 'Orbitron', sans-serif; color: var(--text-main); font-weight: 900; font-size: 1.8rem; text-decoration: none; letter-spacing: 3px; text-shadow: 0 0 10px var(--neon-blue); }
        .nav-links a { color: var(--text-muted); text-decoration: none; font-size: 1.1rem; margin-left: 2.5rem; text-transform: uppercase; font-weight: 600; letter-spacing: 1px; transition: 0.3s; }
        .nav-links a:hover { color: var(--neon-blue); text-shadow: 0 0 8px var(--neon-blue); }
        .page-header { padding: 10rem 2rem 3rem; text-align: center; background: linear-gradient(rgba(5,5,5,0.7) 0%, rgba(5,5,5,1) 100%), url('https://images.unsplash.com/photo-1551288049-bebda4e38f71?q=80&w=1920') center/cover no-repeat; position: relative; }
        .page-header-content { position: relative; z-index: 2; } <!-- testo sopra lo sfondo -->
        .page-header h1 { font-family: 'Orbitron', sans-serif; font-size: 4rem; color: var(--neon-blue); text-shadow: 0 0 20px rgba(0, 243, 255, 0.5); margin-bottom: 1rem; }
        .page-header p { font-size: 1.2rem; color: var(--text-muted); max-width: 800px; margin: 0 auto; line-height: 1.8; }
        .table-wrapper { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 15px; padding: 2rem; margin: 3rem auto; max-width: 1400px; box-shadow: 0 0 30px rgba(0,0,0,0.8); backdrop-filter: blur(10px); }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { padding: 1.5rem; color: var(--neon-blue); font-family: 'Orbitron', sans-serif; font-size: 1rem; letter-spacing: 2px; border-bottom: 2px solid var(--glass-border); }
        td { padding: 1.2rem 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 1.1rem; color: #e2e8f0; font-weight: 500; transition: 0.2s; }
        tr:hover td { background: var(--table-row-hover); color: #fff; } <!-- effetto hover sulle righe -->
        .status-badge { background: rgba(0, 243, 255, 0.1); border: 1px solid var(--neon-blue); color: var(--neon-blue); padding: 0.3rem 1rem; border-radius: 50px; font-size: 0.9rem; font-weight: 700; text-shadow: 0 0 5px var(--neon-blue); box-shadow: 0 0 10px rgba(0, 243, 255, 0.2); }
        .status-ottimale { color: #00ff88; border-color: #00ff88; box-shadow: 0 0 10px rgba(0,255,136,0.2); }
        .status-archiviato { color: #ff3366; border-color: #ff3366; box-shadow: 0 0 10px rgba(255,51,102,0.2); }
        .btn-back { display: inline-flex; align-items: center; gap: 8px; margin-top: 30px; padding: 12px 24px; background-color: white; border: 1px solid var(--glass-border); color: var(--dark-bg); text-decoration: none; border-radius: 6px; font-weight: 600; transition: all 0.2s; font-size: 14px; }
        .btn-back:hover { transform: translateX(-5px); background: rgba(255,255,255,0.08); } <!-- bottone hover -->
        footer { text-align: center; padding: 3rem; font-family: 'Orbitron', sans-serif; color: var(--text-muted); border-top: 1px solid var(--glass-border); background: #000; letter-spacing: 2px; }
        @media (max-width: 900px) { .navbar { padding: 1rem 2rem; } .page-header { padding: 8rem 1.5rem 2rem; } .table-wrapper { padding: 1.5rem; } th, td { padding: 1rem 1rem; } }
    </style>
</head>
<body> <!-- corpo della pagina -->
    <nav class="navbar"> <!-- menu fisso in alto -->
        <a href="/" class="nav-logo">NEXUS_OS</a> <!-- torna alla home -->
        <div class="nav-links"> <!-- link di navigazione -->
            <a href="/">Mainframe</a>
            <a href="/tutti_i_robot">System API</a>
        </div>
    </nav>

    <div class="page-header"> <!-- intestazione della pagina reparto -->
        <div class="page-header-content"> <!-- testo sopra lo sfondo -->
            <h1>{{ titolo }}</h1> <!-- titolo passato da Python -->
            <p>{{ sottotitolo }}</p> <!-- sottotitolo passato da Python -->
        </div>
    </div>

    <div style="padding: 0 2rem;"> <!-- area principale con padding laterale -->
        <div class="table-wrapper"> <!-- scatola della tabella -->
            <table> <!-- tabella dati robot -->
                <thead>
                    <tr>
                        <th>IDENTIFICATIVO</th><th>MODELLO</th><th>CLASSE</th><th>ANNO</th><th>ENERGIA</th><th>STATO</th>
                    </tr>
                </thead>
                <tbody> <!-- dentro qui inseriamo una riga per ogni robot -->
                    {% for r in robots %}
                    <tr>
                        <td style="font-family: Orbitron; color: var(--neon-purple);">[{{ r[0] }}]</td> <!-- id del robot -->
                        <td>{{ r[1] }}</td> <!-- modello -->
                        <td>{{ r[2] }}</td> <!-- classe -->
                        <td>{{ r[3] }}</td> <!-- anno -->
                        <td>{{ r[4] }}H</td> <!-- energia rimasta -->
                        <td><span class="status-badge {{ badge_class }}">{{ badge_text }}</span></td> <!-- stato con badge dinamico -->
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
        <div style="text-align: center; margin-bottom: 5rem;"> <!-- bottone di ritorno -->
            <a href="/" class="btn-back">← TORNA AL MAINFRAME</a>
        </div>
    </div>

    <footer> <!-- footer finale -->
        © 2026 NEXUS CORPORATION - CONNESSIONE QUANTISTICA CRIPTATA
    </footer>
</body>
</html>
